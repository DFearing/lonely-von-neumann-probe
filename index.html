<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; script-src 'self'">
    <title>LVNP · Mission Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/src/ui/styles.css" />
  </head>
  <body>
    <div id="splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: #0a0e17;
      animation: splash-fade 1s ease-out 3s forwards;
      pointer-events: none;
    ">
      <img src="/splash.png" alt="" style="
        width: 100%; height: 100%;
        object-fit: cover;
      " />
    </div>
    <style>
      @keyframes splash-fade {
        to { opacity: 0; }
      }
    </style>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      document.getElementById("splash").addEventListener("animationend", function() {
        this.remove();
      });
    </script>
  </body>
</html>
